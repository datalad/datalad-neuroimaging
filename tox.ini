[tox]
envlist = lint,py3{10,11,12,13}
# These tests require git-annex which must be installed system-wide
skipsdist = false

[testenv]
extras = devel
commands =
    python -m pytest {posargs:-s -v --cov=datalad_neuroimaging --pyargs datalad_neuroimaging}

[testenv:lint]
skip_install = true
deps =
    codespell
commands =
    codespell
